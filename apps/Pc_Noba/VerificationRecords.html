<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Registros</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    <!-- Styles -->
    <link href="../Utils_New/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="../Utils_New/css/styles.css" rel="stylesheet">
    <link rel="stylesheet" href="../Utils_New/css/sweetalert2.min.css">
    <link rel="stylesheet" href="./VerificationRecords.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">

                <!-- Header -->
                <div class="text-center mb-4 mb-md-5">
                    <div class="icon-wrapper mb-3 mb-md-4">
                        <i class="fa-solid fa-shield"></i>
                    </div>
                    <h1 class="mb-3">Verificación de Registro</h1>
                </div>

                <!-- Card Principal -->
                <div class="card-verification mb-4">

                    <!-- Header -->
                    <div class="card-header-custom">
                        <div class="d-flex align-items-center justify-content-center gap-3">
                            <i class="fas fa-circle-check check-icon flex-shrink-0"></i>
                            <div class="text-center">
                                <h2 class="mb-1" id="textTitle">Registro Válido</h2>
                                <p class="text-muted mb-0 small" id="textDescription">
                                    El registro ha sido verificado correctamente
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Body -->
                    <div class="card-body p-3 p-md-4">

                        <!-- Folio -->
                        <div class="info-item mb-3 mb-md-4">
                            <div class="d-flex gap-3 gap-md-4">
                                <i class="fas fa-file-lines flex-shrink-0 mt-1"></i>
                                <div class="flex-grow-1">
                                    <p class="info-label mb-1">Folio de Registro</p>
                                    <p class="info-value mb-0" id="textFolio">REG-2026-041324</p>
                                </div>
                            </div>
                        </div>

                        <!-- Fecha -->
                        <div class="info-item mb-3 mb-md-4">
                            <div class="d-flex gap-3 gap-md-4">
                                <i class="fas fa-calendar-days flex-shrink-0 mt-1"></i>
                                <div class="flex-grow-1">
                                    <p class="info-label mb-1">Fecha de Verificación</p>
                                    <p class="info-value mb-0" id="textDate">13 de abril de 2026</p>
                                </div>
                            </div>
                        </div>

                        <!-- Estatus -->
                        <div class="info-item mb-3 mb-md-4">
                            <div class="d-flex gap-3 gap-md-4">
                                <i class="fa-solid fa-user flex-shrink-0 mt-1"></i>
                                <div class="flex-grow-1">
                                    <p class="info-label mb-1">Cliente</p>
                                    <p class="info-value mb-0" id="textClient">Cliente 001</p>
                                </div>
                            </div>
                        </div>


                        <!-- Estatus -->
                        <div class="info-item mb-3 mb-md-4">
                            <div class="d-flex gap-3 gap-md-4">
                                <i class="fas fa-chart-line flex-shrink-0 mt-1"></i>
                                <div class="flex-grow-1">
                                    <p class="info-label mb-1">Estatus</p>
                                    <p class="info-value mb-0" id="textStatus">Verificado</p>
                                </div>
                            </div>
                        </div>

                        <!-- Auditor -->
                        <div class="info-item mb-0">
                            <div class="d-flex gap-3 gap-md-4">
                                <i class="fas fa-user-check flex-shrink-0 mt-1"></i>
                                <div class="flex-grow-1">
                                    <p class="info-label mb-1">Auditor Responsable</p>
                                    <p class="info-value mb-0" id="textResponsible">María González Hernández</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../styles/js/chroma.min.js"></script>
    <script src="../Utils_New/js/sweetalert2.all.min.js"></script>
    <script src="../Utils_New/js/lkf_utils.js"></script>
    <script src="../Utils_New/js/servido_utils.js"></script>

    <script src="./VerificationRecords.js"></script>
</body>
</html>
