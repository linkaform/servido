<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" /><meta content="width=device-width,initial-scale=1" name="viewport" /><title>
            Servidor en Mantenimiento</title
        >
        <style>
            html, body{
                background: linear-gradient(to bottom, #4C88A3, #030D16);
            }
            body {
                margin: 0;
                height: 100vh;
                background-image: url("https://f001.backblazeb2.com/file/app-linkaform/public-client-126/71202/60b81349bde5588acca320e1/69b1ee3d145a69c9c0baefee.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            .container {
                gap: 15px;
                height: 100vh;
                width: 100vw;
                display: flex;
                align-items: anchor-center;
                justify-content: left;
            }
            .text-warning {
                color: #fff;
                border-radius: 5px;
                background: #e16f16;
                display: inline-block;
                margin: 0 0 0 4vw;
                padding: 10px 15px 10px 15px;
                font-size: clamp(14px, 2vw, 19px);
                font-family: Helvetica, Arial, sans-serif;
                font-weight: 600;
            }
            .text-title {
                color: #fff;
                display: block;
                font-size: clamp(40px, 8vw, 70px);
                margin: 0 0 0 4vw;
                font-family: Helvetica, Arial, sans-serif;
                font-weight: 700;
            }
            .hr-division {
                width: 30vw;
                height: 5px;
                background-color: #e16f16;
                border: none;
                margin: 0 0 0 4.3vw;
            }
            .text-description {
                color: #fff;
                display: block;
                margin: 0 0 0 4vw;
                font-size: clamp(16px, 3vw, 30px);
                font-family: Helvetica, Arial, sans-serif;
                font-weight: 400;
            }
            .text-schedule-date {
                color: #e16f16;
                display: block;
                margin: 0 0 0 4vw;
                font-size: clamp(20px, 4vw, 40px);
                font-family: Helvetica, Arial, sans-serif;
                font-weight: 700;
            }
            .text-schedule-hour {
                color: #fff;
                display: block;
                margin: 0 0 0 4vw;
                font-size: clamp(20px, 4vw, 40px);
                font-family: Helvetica, Arial, sans-serif;
                font-weight: 700;
            }
            .img-logo{
               width: clamp(250px, 25vw, 550px);
                height: auto;
                margin: 0 0 1vw 4vw;
                display: block;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="text-box">
                <img src="https://f001.backblazeb2.com/file/app-linkaform/public-client-126/71202/60b81349bde5588acca320e1/69b2d8511a995b7f6ef03209.png" alt="Linkaform" class="img-logo">
                <span class="text-warning">MANTENIMIENTO PROGRAMADO</span><br />
                <span class="text-title">
                    ACTUALIZACIÓN<br>
                    DE LA PLATAFORMA
                </span>
                <hr class="hr-division">
                <span class="text-description">
                    Nuestro sistema estará temporalmente<br>
                    fuera de servicio mientras realizamos<br>
                    mejoras para brindarte un mejor servicio.
                </span>
            </div>
        </div>
    </body>
</html>
